<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" role="img" aria-label="MemoryBinder">
  <title>MemoryBinder</title>
  <!-- Property binder: spine + folio lines + magenta seal (“title” / authenticity) -->
  <rect x="10" y="18" width="14" height="44" rx="3" fill="#3d6563"/>
  <path
    fill="#f7f5f3"
    stroke="#3d6563"
    stroke-width="1.75"
    d="M24 21h43a3 3 0 013 3v32a3 3 0 01-3 3H24V21z"
  />
  <!-- Double ring at spine — reads as binder hardware at favicon sizes -->
  <circle cx="17" cy="35" r="3.25" fill="none" stroke="#5a887f" stroke-width="1.2" opacity="0.75"/>
  <circle cx="17" cy="45" r="3.25" fill="none" stroke="#5a887f" stroke-width="1.2" opacity="0.75"/>
  <path stroke="#cfd9d8" stroke-width="1.25" stroke-linecap="round" d="M32 34h31M32 43h24M32 52h28"/>
  <!-- Magenta plum seal -->
  <circle cx="54" cy="33" r="7" fill="#9f4780"/>
  <circle cx="54" cy="33" r="4.8" stroke="#fdfcfa" stroke-width="1.2" opacity="0.92" fill="none"/>
  <circle cx="54" cy="33" r="3" stroke="rgba(255,255,255,0.45)" stroke-width="0.75" fill="none" opacity="0.9"/>
</svg>
